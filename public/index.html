<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP-lerts - Minecraft Style</title>
    <style>
        @font-face {
            font-family: 'Minecraft';
            src: url('https://db.onlinewebfonts.com/t/6ab539c6fc2b21ff0b149b3d06d7f97c.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --color-bg: #1a1a1a;
            --color-bg-panel: #222222;
            --color-bg-element: #2a2a2a;
            --color-bg-hover: #333333;
            --color-border: #444444;
            --color-border-light: #555555;
            --color-text: #e0e0e0;
            --color-text-muted: #888888;
            --color-text-dim: #666666;
            --color-purple: #bf49d6;
            --color-purple-dark: #a248b4;
            --color-success: #43b581;
            --color-error: #f04747;
            --color-gold: #ffaa00;
            --color-gold-dark: #cc8800;
            --pixel-shadow-dark: rgba(0, 0, 0, 0.45);
            --pixel-highlight: rgba(255, 255, 255, 0.18);
            --font-mc: 'Minecraft', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        body {
            font-family: var(--font-mc);
            background-color: transparent !important;
            color: var(--color-text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: none;
            image-rendering: pixelated;
            overflow: hidden;
        }

        #donation-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
            z-index: 9999;
        }

        /* Minecraft-style panel */
        .donation-alert {
            position: relative;
            width: 420px;
            background: var(--color-bg-panel);
            border: 3px solid var(--color-border);
            box-shadow: 
                inset 2px 2px 0 0 var(--pixel-highlight),
                inset -2px -2px 0 0 var(--pixel-shadow-dark),
                4px 4px 0 0 rgba(0, 0, 0, 0.3);
            padding: 16px;
            transform: translateX(-100%);
            opacity: 0;
            transition: all 0.4s steps(10);
            pointer-events: none;
            color: var(--color-text);
            image-rendering: pixelated;
        }

        .donation-alert.show {
            transform: translateX(0);
            opacity: 1;
        }

        .donation-alert.hide {
            transform: translateX(-100%);
            opacity: 0;
        }

        /* Header с аватаром и ником */
        .alert-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--color-border);
        }

        .avatar-wrapper {
            position: relative;
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .minecraft-avatar {
            width: 48px;
            height: 48px;
            border: 2px solid var(--color-border);
            box-shadow: 
                inset 1px 1px 0 0 var(--pixel-highlight),
                inset -1px -1px 0 0 var(--pixel-shadow-dark);
            image-rendering: pixelated;
            display: block;
            background: var(--color-bg-element);
        }

        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.05) 0px,
                rgba(0, 0, 0, 0.05) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .username {
            font-size: 18px;
            font-weight: normal;
            color: var(--color-text);
            text-shadow: 2px 2px 0 var(--color-bg);
            letter-spacing: 0.5px;
            word-break: break-word;
            margin-bottom: 4px;
            text-transform: none;
        }

        .amount-wrapper {
            display: flex;
            align-items: baseline;
            gap: 6px;
            background: var(--color-bg);
            padding: 4px 8px;
            border: 2px solid var(--color-border);
            box-shadow: inset 1px 1px 0 0 var(--pixel-shadow-dark);
            display: inline-block;
        }

        .amount {
            font-size: 20px;
            color: var(--color-gold);
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }

        .currency {
            font-size: 14px;
            color: var(--color-gold-dark);
            margin-left: 4px;
        }

        /* КОММЕНТАРИЙ - САМОЕ ГЛАВНОЕ */
        .comment {
            font-size: 16px;
            color: var(--color-text);
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            box-shadow: 
                inset 2px 2px 0 0 var(--pixel-shadow-dark),
                inset -1px -1px 0 0 var(--pixel-highlight);
            padding: 12px;
            margin-top: 12px;
            line-height: 1.4;
            word-break: break-word;
            min-height: 60px;
            max-height: 150px;
            overflow-y: auto;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.2);
            font-style: normal;
            letter-spacing: 0.3px;
        }

        .comment:empty {
            display: none;
        }

        .comment::before {
            content: "❝";
            font-size: 24px;
            color: var(--color-purple);
            margin-right: 6px;
            opacity: 0.7;
        }

        .comment::after {
            content: "❞";
            font-size: 24px;
            color: var(--color-purple);
            margin-left: 6px;
            opacity: 0.7;
            vertical-align: top;
        }

        /* Прогресс-бар в стиле Minecraft */
        .progress-bar {
            position: absolute;
            bottom: -3px;
            left: -3px;
            right: -3px;
            height: 4px;
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            box-shadow: inset 0 0 0 1px var(--pixel-shadow-dark);
        }

        .progress-fill {
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                var(--color-purple) 0px,
                var(--color-purple) 6px,
                var(--color-purple-dark) 6px,
                var(--color-purple-dark) 12px
            );
            width: 100%;
            transform-origin: left;
            animation: shrink 10s linear forwards;
            box-shadow: inset 0 1px 0 0 var(--pixel-highlight);
        }

        /* Позиционирование */
        #donation-container.top-left { top: 30px; left: 30px; bottom: auto; }
        #donation-container.top-right { top: 30px; right: 30px; left: auto; bottom: auto; }
        #donation-container.bottom-right { bottom: 30px; right: 30px; left: auto; }
        #donation-container.center { 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            bottom: auto; 
        }

        #donation-container.top-right .donation-alert,
        #donation-container.bottom-right .donation-alert {
            transform: translateX(100%);
        }

        #donation-container.top-right .donation-alert.show,
        #donation-container.bottom-right .donation-alert.show {
            transform: translateX(0);
        }

        #donation-container.top-right .donation-alert.hide,
        #donation-container.bottom-right .donation-alert.hide {
            transform: translateX(100%);
        }

        #donation-container.center .donation-alert {
            transform: scale(0.9);
            opacity: 0;
        }

        #donation-container.center .donation-alert.show {
            transform: scale(1);
            opacity: 1;
        }

        #donation-container.center .donation-alert.hide {
            transform: scale(0.9);
            opacity: 0;
        }

        /* Индикатор соединения */
        #connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 6px 10px;
            font-family: var(--font-mc);
            font-size: 12px;
            background: var(--color-bg-panel);
            color: var(--color-text);
            border: 2px solid var(--color-border);
            box-shadow: inset 1px 1px 0 0 var(--pixel-highlight);
            pointer-events: none;
            z-index: 10000;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.3);
        }

        #connection-status.connected {
            border-color: var(--color-success);
            color: var(--color-success);
        }

        #connection-status.disconnected {
            border-color: var(--color-error);
            color: var(--color-error);
        }

        #connection-status.reconnecting {
            border-color: var(--color-gold);
            color: var(--color-gold);
        }

        /* Анимации */
        @keyframes shrink {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        /* Скроллбар */
        .comment::-webkit-scrollbar {
            width: 8px;
        }

        .comment::-webkit-scrollbar-track {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
        }

        .comment::-webkit-scrollbar-thumb {
            background: var(--color-border-light);
            border: 1px solid var(--color-border);
        }

        .comment::-webkit-scrollbar-thumb:hover {
            background: var(--color-text-dim);
        }
    </style>
</head>
<body>
    <div id="connection-status" class="disconnected">
        <span id="status-text">Подключение...</span>
        <span id="connection-count" style="margin-left: 8px;"></span>
    </div>

    <div id="donation-container" class="bottom-left"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        (function() {
            // Настройки из URL параметров
            const urlParams = new URLSearchParams(window.location.search);
            const config = {
                position: urlParams.get('position') || 'bottom-left',
                duration: parseInt(urlParams.get('duration')) || 10000,
                minAmount: parseInt(urlParams.get('minAmount')) || 0,
                maxAlerts: parseInt(urlParams.get('maxAlerts')) || 5,
                showStatus: urlParams.get('showStatus') !== 'false',
                server: 'https://spmtv.onrender.com'
            };
            
            const socket = io(config.server, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: Infinity,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                timeout: 20000
            });
            
            const container = document.getElementById('donation-container');
            const statusDiv = document.getElementById('connection-status');
            const statusText = document.getElementById('status-text');
            const connectionCount = document.getElementById('connection-count');
            
            container.className = config.position;
            
            if (!config.showStatus) {
                statusDiv.style.display = 'none';
            }
            
            // Загрузка аватара Minecraft
            async function loadMinecraftAvatar(username, uuid) {
                const cleanUuid = uuid ? uuid.replace(/-/g, '') : null;
                
                const services = [
                    { url: cleanUuid ? `https://mc-heads.net/avatar/${cleanUuid}/64` : null, name: 'MC-Heads' },
                    { url: cleanUuid ? `https://minotar.net/avatar/${cleanUuid}/64` : null, name: 'Minotar' },
                    { url: cleanUuid ? `https://crafatar.com/avatars/${cleanUuid}?size=64&overlay` : null, name: 'Crafatar' }
                ].filter(s => s.url !== null);
                
                if (!cleanUuid) {
                    try {
                        const mojangRes = await fetch(`https://api.mojang.com/users/profiles/minecraft/${username}`);
                        if (mojangRes.ok) {
                            const mojangData = await mojangRes.json();
                            if (mojangData.id) {
                                return await loadMinecraftAvatar(username, mojangData.id);
                            }
                        }
                    } catch (e) {
                        console.warn('⚠️ Не удалось получить UUID:', e);
                    }
                    return 'https://mc-heads.net/avatar/MHF_Question/64';
                }
                
                for (const service of services) {
                    try {
                        await new Promise((resolve, reject) => {
                            const img = new Image();
                            img.onload = () => resolve();
                            img.onerror = () => reject();
                            img.src = service.url;
                            setTimeout(() => reject(new Error('Timeout')), 3000);
                        });
                        return service.url;
                    } catch (error) {
                        console.warn(`⚠️ Сервис ${service.name} недоступен`);
                    }
                }
                
                return 'https://mc-heads.net/avatar/MHF_Question/64';
            }
            
            // Форматирование суммы с тремя знаками после запятой
            function formatAmount(amount) {
                return amount.toFixed(3);
            }
            
            // Экранирование HTML
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            // Создание алерта
            async function createAlert(data) {
                if (data.amount < config.minAmount) {
                    console.log(`ℹ️ Донат ${data.amount} АР пропущен (мин: ${config.minAmount})`);
                    return false;
                }
                
                const alertDiv = document.createElement('div');
                alertDiv.className = 'donation-alert';
                
                const formattedAmount = formatAmount(data.amount);
                const safeUsername = escapeHtml(data.username);
                const safeComment = escapeHtml(data.comment);
                
                // Загружаем аватар
                const avatarUrl = await loadMinecraftAvatar(data.username, data.uuid || null);
                
                alertDiv.innerHTML = `
                    <div class="alert-header">
                        <div class="avatar-wrapper">
                            <img class="minecraft-avatar" src="${avatarUrl}" alt="${safeUsername}" onerror="this.src='https://mc-heads.net/avatar/MHF_Question/64'">
                            <div class="avatar-overlay"></div>
                        </div>
                        <div class="user-info">
                            <div class="username">${safeUsername}</div>
                            <div class="amount-wrapper">
                                <span class="amount">${formattedAmount}</span>
                                <span class="currency">АР</span>
                            </div>
                        </div>
                    </div>
                    ${data.comment ? `<div class="comment">${safeComment}</div>` : ''}
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                `;
                
                container.insertBefore(alertDiv, container.firstChild);
                
                setTimeout(() => alertDiv.classList.add('show'), 10);
                
                setTimeout(() => {
                    alertDiv.classList.remove('show');
                    alertDiv.classList.add('hide');
                    
                    setTimeout(() => {
                        if (alertDiv.parentNode) {
                            alertDiv.parentNode.removeChild(alertDiv);
                        }
                    }, 400);
                }, config.duration);
                
                while (container.children.length > config.maxAlerts) {
                    const lastAlert = container.lastChild;
                    lastAlert.classList.remove('show');
                    lastAlert.classList.add('hide');
                    setTimeout(() => {
                        if (lastAlert.parentNode) {
                            lastAlert.parentNode.removeChild(lastAlert);
                        }
                    }, 400);
                }
                
                return true;
            }
            
            // Socket обработчики
            socket.on('connect', () => {
                console.log('✅ Подключено к серверу');
                statusText.textContent = '✅ Подключено';
                statusDiv.className = 'connected';
                
                setInterval(() => {
                    if (socket.connected) socket.emit('ping');
                }, 20000);
            });
            
            socket.on('disconnect', (reason) => {
                console.log('❌ Отключено:', reason);
                statusText.textContent = '❌ Отключено';
                statusDiv.className = 'disconnected';
            });
            
            socket.on('reconnecting', (attempt) => {
                statusText.textContent = `⟳ Подключение ${attempt}...`;
                statusDiv.className = 'reconnecting';
            });
            
            socket.on('reconnect', () => {
                statusText.textContent = '✅ Подключено';
                statusDiv.className = 'connected';
            });
            
            socket.on('connect_error', (error) => {
                console.error('❌ Ошибка:', error);
                statusText.textContent = '⚠️ Ошибка';
                statusDiv.className = 'disconnected';
            });
            
            // Обработка донатов
            socket.on('new_donation', async (data) => {
                console.log('🎉 Донат:', data);
                const shown = await createAlert(data);
                if (shown) {
                    console.log(`✅ ${data.amount} АР от ${data.username}`);
                }
            });
            
            // Тестовый донат
            window.testDonation = async function(amount = 500, username = "TestPlayer") {
                await createAlert({
                    id: 'test_' + Date.now(),
                    username: username,
                    amount: amount,
                    comment: "Тестовое сообщение! Спасибо за стрим!",
                    type: "incoming",
                    createdAt: new Date().toISOString()
                });
                console.log('🧪 Тестовый донат создан');
            };
            
            console.log('🎮 AP-lerts Minecraft Edition загружен');
            console.log('💡 Тест: testDonation(сумма, "ник")');
        })();
    </script>
</body>
</html>
